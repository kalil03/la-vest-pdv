spring.application.name=pdv

spring.datasource.url=jdbc:postgresql://localhost:5433/pdv
spring.datasource.username=pdv
spring.datasource.password=pdv

# O schema e dono do Flyway; o Hibernate apenas valida que as entidades batem com ele
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

loja.nome=La Vest
loja.endereco=Av. Brasil, 762 - Campina da Lagoa/PR
loja.telefone=(44) 9929-0148

# --- NFC-e via Focus NFe (Fase 2) ---
# ambiente: homologacao (nota de teste, sem valor) ou producao
focus.ambiente=homologacao
focus.url.homologacao=https://homologacao.focusnfe.com.br
focus.url.producao=https://api.focusnfe.com.br
# token da conta Focus NFe (deixar vazio desliga a emissao). NUNCA commitar o real
focus.token=
# emitente (a loja) — preencher com os dados reais quando for emitir
fiscal.cnpj=
fiscal.inscricao-estadual=
fiscal.csc=
fiscal.csc-id=
# tributacao padrao da loja (Simples Nacional, varejo de vestuario)
fiscal.csosn-padrao=102
fiscal.cfop-padrao=5102

