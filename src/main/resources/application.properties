spring.application.name=pdv

spring.datasource.url=jdbc:postgresql://localhost:5433/pdv
spring.datasource.username=pdv
spring.datasource.password=pdv

# O schema e dono do Flyway; o Hibernate apenas valida que as entidades batem com ele
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

loja.nome=La Vest
loja.endereco=Av. Brasil, 762 - Campina da Lagoa/PR
loja.telefone=(44) 9929-0148

# --- NFC-e direto na SEFAZ-PR (gratis, sem gateway pago) ---
# Caminho ativo da Fase 2: o sistema monta/assina/transmite o XML 4.00.
# (Os campos focus.* abaixo ficam so como referencia historica do gateway pago.)
#
# ambiente: homologacao (tpAmb=2, nota de teste sem valor) ou producao (tpAmb=1)
fiscal.ambiente=homologacao
fiscal.uf=PR
# emitente (a loja) — preencher com os dados reais antes de emitir
fiscal.cnpj=
fiscal.inscricao-estadual=
fiscal.razao-social=
fiscal.nome-fantasia=
# CRT: 1=Simples Nacional
fiscal.crt=1
fiscal.cnae=
# endereco do emitente (cod-municipio = codigo IBGE de 7 digitos)
fiscal.endereco.logradouro=
fiscal.endereco.numero=
fiscal.endereco.bairro=
fiscal.endereco.municipio=
fiscal.endereco.cod-municipio=
fiscal.endereco.cep=
fiscal.endereco.fone=
# CSC (Codigo de Seguranca do Contribuinte) — so necessario p/ assinar e transmitir.
# NUNCA commitar os valores reais.
fiscal.csc=
fiscal.csc-id=
# NFC-e: serie e URLs de consulta do QR Code da SEFAZ-PR
fiscal.nfce.serie=1
# URL de consulta do QR Code (PR). Homologacao e producao tem hosts distintos.
fiscal.nfce.url-qrcode=http://www.fazenda.pr.gov.br/nfce/qrcode
# tributacao padrao da loja (Simples Nacional, varejo de vestuario)
fiscal.csosn-padrao=102
fiscal.cfop-padrao=5102

# --- (referencia) gateway pago Focus NFe — NAO usado ---
focus.ambiente=homologacao
focus.url.homologacao=https://homologacao.focusnfe.com.br
focus.url.producao=https://api.focusnfe.com.br
focus.token=

