<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDV — Venda</title>
  <link rel="stylesheet" href="/css/pdv.css">
</head>
<body>
  <header class="topo">
    <h1>PDV</h1>
    <nav>
      <a href="/" class="atual">Venda</a>
      <a href="/produtos.html">Produtos</a>
      <a href="/clientes.html">Clientes</a>
    </nav>
  </header>

  <main class="venda">
    <!-- Busca de produto: o caixa digita código OU nome e dá Enter -->
    <section class="busca-area">
      <input id="busca" type="text" autocomplete="off" autofocus
             placeholder="Código, código de barras ou nome do produto  (Enter adiciona)">
      <ul id="busca-resultados" class="dropdown" hidden></ul>
    </section>

    <!-- Itens da venda -->
    <section class="itens-area">
      <table id="tabela-itens">
        <thead>
          <tr>
            <th>Código</th><th>Produto</th><th class="num">Qtd</th>
            <th class="num">Preço</th><th class="num">Subtotal</th><th></th>
          </tr>
        </thead>
        <tbody id="itens"></tbody>
      </table>
      <p id="itens-vazio" class="vazio">Nenhum item. Busque um produto acima para começar.</p>
    </section>

    <!-- Rodapé: cliente + pagamento + avançar -->
    <footer class="fechamento">
      <div class="cliente-area">
        <label for="cliente">Cliente <small>(opcional, obrigatório no fiado)</small></label>
        <div class="cliente-linha">
          <input id="cliente" type="text" autocomplete="off" placeholder="Nome, CPF ou telefone">
          <button id="cliente-limpar" type="button" title="Limpar cliente" hidden>&times;</button>
        </div>
        <ul id="cliente-resultados" class="dropdown" hidden></ul>
        <span id="cliente-badge" class="badge" hidden></span>
        <span id="cliente-novo-aviso" class="aviso" hidden>Cliente novo — será cadastrado ao fechar a venda</span>
      </div>

      <div class="pagamento-area">
        <div class="formas" id="formas">
          <button type="button" data-forma="DINHEIRO" class="ativa">Dinheiro <kbd>F2</kbd></button>
          <button type="button" data-forma="PIX">PIX <kbd>F3</kbd></button>
          <button type="button" data-forma="CARTAO">Cartão <kbd>F4</kbd></button>
          <button type="button" data-forma="FIADO">Fiado <kbd>F6</kbd></button>
        </div>
        <div class="total-linha">
          <span>Total</span>
          <strong id="total">R$ 0,00</strong>
        </div>
        <button id="avancar" type="button" class="fechar-btn">
          Revisar e fechar <kbd>F10</kbd>
        </button>
      </div>
    </footer>
  </main>

  <!-- Confirmação: revisão, desconto, vendedor, parcelamento, cancelar -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-labelledby="modal-titulo">
      <h2 id="modal-titulo">Confirmar venda</h2>

      <div id="m-itens" class="m-itens"></div>

      <div class="m-linha"><span>Subtotal</span><strong id="m-subtotal"></strong></div>

      <div class="m-linha m-campos">
        <label for="m-desconto">Desconto</label>
        <select id="m-desconto-modo">
          <option value="R$">R$</option>
          <option value="%">%</option>
        </select>
        <input id="m-desconto" type="number" min="0" step="0.01" value="0">
      </div>

      <div class="m-linha m-campos">
        <label for="m-vendedor">Vendedor</label>
        <select id="m-vendedor"><option value="">—</option></select>
      </div>

      <div class="m-linha m-campos">
        <label for="m-forma">Pagamento</label>
        <select id="m-forma">
          <option value="DINHEIRO">Dinheiro</option>
          <option value="PIX">PIX</option>
          <option value="CARTAO">Cartão</option>
          <option value="FIADO">Fiado</option>
        </select>
        <select id="m-parcelas-cartao" hidden></select>
      </div>

      <!-- Bloco do fiado: entrada + cronograma com recálculo automático -->
      <div id="m-fiado" hidden>
        <div class="m-linha m-campos">
          <label for="m-entrada">Entrada</label>
          <input id="m-entrada" type="number" min="0" step="0.01" value="0">
          <select id="m-entrada-tipo">
            <option value="DINHEIRO">Dinheiro</option>
            <option value="PIX">PIX</option>
            <option value="CARTAO">Cartão</option>
          </select>
        </div>
        <div class="m-linha m-campos">
          <label for="m-num-parcelas">Parcelas</label>
          <input id="m-num-parcelas" type="number" min="1" max="24" value="1">
          <label for="m-primeiro-venc">1º venc.</label>
          <input id="m-primeiro-venc" type="date">
        </div>
        <table class="m-parcelas">
          <tbody id="m-parcelas-corpo"></tbody>
        </table>
      </div>

      <div class="m-linha m-total"><span>Total a cobrar</span><strong id="m-total"></strong></div>
      <p id="m-erro" class="m-erro" hidden></p>

      <div class="m-botoes">
        <button id="m-cancelar" type="button" class="m-btn-cancelar">Cancelar <kbd>Esc</kbd></button>
        <button id="m-confirmar" type="button" class="fechar-btn">Confirmar e imprimir <kbd>F10</kbd></button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="/js/recibo.js"></script>
  <script src="/js/venda.js"></script>
</body>
</html>
