<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDV — Produtos</title>
  <link rel="stylesheet" href="/css/pdv.css">
</head>
<body>
  <header class="topo">
    <h1>PDV</h1>
    <nav>
      <a href="/">Venda</a>
      <a href="/produtos.html" class="atual">Produtos</a>
      <a href="/clientes.html">Clientes</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2 id="form-titulo">Novo produto</h2>
      <form id="form-produto">
        <input type="hidden" id="produto-id">
        <div class="form-grid">
          <div>
            <label for="codigo">Código</label>
            <input id="codigo" type="text" placeholder="vazio = gerar">
          </div>
          <div>
            <label for="nome">Nome *</label>
            <input id="nome" type="text" required>
          </div>
          <div>
            <label for="marca">Marca</label>
            <input id="marca" type="text" list="marcas" placeholder="nova = criada na hora">
            <datalist id="marcas"></datalist>
          </div>
          <div>
            <label for="categoria">Categoria</label>
            <input id="categoria" type="text" list="categorias">
            <datalist id="categorias">
              <option value="Roupas"></option>
              <option value="Calçados"></option>
              <option value="Perfumes"></option>
            </datalist>
          </div>
          <div>
            <label for="preco">Preço (R$) *</label>
            <input id="preco" type="number" min="0" step="0.01" required>
          </div>
        </div>

        <fieldset class="fiscal">
          <legend>Dados fiscais (para a NFC-e — podem ser preenchidos depois)</legend>
          <div class="form-grid fiscal-grid">
            <div>
              <label for="ncm">NCM</label>
              <input id="ncm" type="text" maxlength="8" placeholder="8 dígitos">
            </div>
            <div>
              <label for="cest">CEST</label>
              <input id="cest" type="text" maxlength="7">
            </div>
            <div>
              <label for="unidade">Unidade</label>
              <input id="unidade" type="text" value="UN" maxlength="6">
            </div>
            <div>
              <label for="codigo-barras">Cód. barras (EAN)</label>
              <input id="codigo-barras" type="text" maxlength="14">
            </div>
            <div>
              <label for="origem">Origem</label>
              <select id="origem">
                <option value="0">0 — Nacional</option>
                <option value="1">1 — Estrangeira (importação direta)</option>
                <option value="2">2 — Estrangeira (mercado interno)</option>
              </select>
            </div>
          </div>
        </fieldset>

        <label class="grade-toggle">
          <input id="tem-grade" type="checkbox">
          Tem grade (tamanho/cor)?
        </label>

        <div id="com-grade" class="grade-area" hidden>
          <div class="botoes-grade">
            <button type="button" id="add-variacao">+ Variação</button>
            <button type="button" id="grade-calcados">Grade calçados 34–44</button>
          </div>
          <div id="variacoes"></div>
        </div>

        <div class="form-acoes">
          <button type="submit" class="salvar-btn" id="salvar">Salvar produto</button>
          <button type="button" id="cancelar-edicao" hidden>Cancelar edição</button>
        </div>
      </form>
    </section>

    <section class="card lista-produtos">
      <h2>Produtos cadastrados</h2>
      <div class="filtros">
        <input id="f-texto" type="text" placeholder="Código, barras ou nome">
        <select id="f-marca"><option value="">Todas as marcas</option></select>
        <select id="f-categoria"><option value="">Todas as categorias</option></select>
        <input id="f-data-de" type="date" title="Cadastrado a partir de">
        <input id="f-data-ate" type="date" title="Cadastrado até">
        <button type="button" id="f-limpar">Limpar</button>
      </div>
      <table>
        <thead><tr><th>Código</th><th>Nome</th><th>Marca</th><th>Categoria</th><th>NCM</th><th>Preço</th><th>Cadastro</th><th></th></tr></thead>
        <tbody id="lista"></tbody>
      </table>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="/js/produtos.js"></script>
</body>
</html>
