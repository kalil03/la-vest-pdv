<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDV — Clientes</title>
  <link rel="stylesheet" href="/css/pdv.css">
</head>
<body>
  <header class="topo">
    <h1>PDV</h1>
    <nav>
      <a href="/">Venda</a>
      <a href="/produtos.html">Produtos</a>
      <a href="/clientes.html" class="atual">Clientes</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2 id="form-titulo">Novo cliente</h2>
      <form id="form-cliente">
        <input type="hidden" id="cliente-id">
        <div class="form-grid cliente-grid">
          <div>
            <label for="nome">Nome *</label>
            <input id="nome" type="text" required>
          </div>
          <div>
            <label for="cpf">CPF <small>(p/ NFC-e identificada)</small></label>
            <input id="cpf" type="text" maxlength="14" placeholder="000.000.000-00">
          </div>
          <div>
            <label for="telefone">Telefone</label>
            <input id="telefone" type="text">
          </div>
          <div>
            <label for="email">E-mail</label>
            <input id="email" type="email">
          </div>
        </div>
        <div class="form-grid endereco-grid">
          <div>
            <label for="logradouro">Endereço</label>
            <input id="logradouro" type="text">
          </div>
          <div>
            <label for="numero">Número</label>
            <input id="numero" type="text">
          </div>
          <div>
            <label for="bairro">Bairro</label>
            <input id="bairro" type="text">
          </div>
          <div>
            <label for="cidade">Cidade</label>
            <input id="cidade" type="text">
          </div>
          <div>
            <label for="uf">UF</label>
            <input id="uf" type="text" maxlength="2">
          </div>
          <div>
            <label for="cep">CEP</label>
            <input id="cep" type="text" maxlength="9">
          </div>
        </div>
        <div class="form-acoes">
          <button type="submit" class="salvar-btn" id="salvar">Salvar cliente</button>
          <button type="button" id="cancelar-edicao" hidden>Cancelar edição</button>
        </div>
      </form>
    </section>

    <section class="card lista-produtos">
      <h2>Clientes</h2>
      <div class="filtros">
        <input id="f-texto" type="text" placeholder="Filtrar por nome, CPF ou telefone">
        <button type="button" id="f-limpar">Limpar</button>
      </div>
      <table>
        <thead><tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Cidade</th><th class="num">Saldo devedor</th><th></th></tr></thead>
        <tbody id="lista"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Vendedores</h2>
      <form id="form-vendedor" class="filtros">
        <input id="v-nome" type="text" placeholder="Nome do vendedor *" required>
        <input id="v-cpf" type="text" placeholder="CPF (opcional)">
        <button type="submit" class="salvar-btn" style="margin-top:0">Adicionar</button>
      </form>
      <table>
        <thead><tr><th>Nome</th><th>CPF</th></tr></thead>
        <tbody id="lista-vendedores"></tbody>
      </table>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="/js/clientes.js"></script>
</body>
</html>
