# Config de PRODUCAO (loja, Windows) — fica na mesma pasta do pdv.jar.
# O Spring Boot le este arquivo automaticamente e ele tem prioridade sobre
# o application.properties de dentro do jar.
#
# PostgreSQL nativo do Windows: porta 5432 (padrao). A senha aqui DEVE ser a
# mesma que o Instalar-LaVest.bat define para o usuario 'pdv'.

# PDV de 1 maquina: o Edge abre localhost, nada da rede da loja deve alcancar a API
server.address=127.0.0.1

spring.datasource.url=jdbc:postgresql://localhost:5432/pdv
spring.datasource.username=pdv
spring.datasource.password=pdv

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

loja.nome=La Vest
loja.endereco=Av. Brasil, 762 - Campina da Lagoa/PR
loja.telefone=(44) 9929-0148
